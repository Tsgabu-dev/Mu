<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Mu Event Web</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container main-layout">
        <aside class="navbar">
                <a class="instagram-text-logo" href="panes/home-pane.html" target="contentFrame">
                        <link decoding="async" src="https://www.flaticon.com/free-icon/event_9783268" id="white-color" alt="">
                </a>
                <a class="sub-section" href="panes/home-pane.html" target="contentFrame">
                        <i class="fa-solid fa-house"></i>
                        <span>Home</span>
                </a>
                <a class="sub-section" href="panes/Create Event-pane.html" target="contentFrame">
                        <i class="fa-solid fa-square-plus"></i>
                        <span>Create Event</span>
                </a>
                <a class="sub-section" href="panes/myposts-pane.html" target="contentFrame">
                        <i class="fa-solid  fa-clapperboard"></i>
                        <span>My Posts</span>
                </a>
                <a class="sub-section" href="panes/profile-pane.html" target="contentFrame">
                        <i class="fa-solid fa-user"></i>
                        <span>Profile Setting</span>
                </a>
                <a class="sub-section" href="panes/logout-pane.html" target="contentFrame">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                        <span>Logout</span>
                </a>

                <a class="menu-section" id="hidden" href="panes/more-pane.html" target="contentFrame">
                        <i class="fa-solid fa-bars"></i>
                        <span>More</span>
                </a>
        </aside>


        <div id="profile-view">
            <div class="profile-header">
                <img src="https://via.placeholder.com/120" alt="Profile" class="profile-pic">
                <h2>user name</h2>
                <p>Email:<i class="fa-solid fa-envelope"></i> user@gmail.com</p>
                <p>contact:<i class="fa-solid fa-phone"></i> +251 9.............</p>
                <button class="edit-btn" onclick="toggleEdit()">Edit Profile</button>
            </div>
        </div>

        <div id="profile-edit" style="display: none;">
            <h3>Update Information</h3>
            <form>
                <label>Change Profile Picture</label>
                <input type="file" accept="image/*">
                
                <label>Full Name</label>
                <input type="text" placeholder="Name">

                <label>Department</label>
                <input type="text" placeholder="Department">
                
                <label>New Password</label>
                <input type="password" placeholder="Enter new password">
                
                <div class="button-group">
                    <button type="submit" class="save-btn">Save Changes</button>
                    <button type="button" class="cancel-btn" onclick="toggleEdit()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

     <main class="center">
                <iframe name="contentFrame" id="contentFrame" src="panes/home-pane.html" frameborder="0" loading="eager"></iframe>
        </main>

        <aside class="right-panel">
                <div class="separator"></div>
                <div class="right-content">
                        <!-- Right side placeholder - you can add widgets or links here later -->
                        <p style="padding:18px; color:var(--secod-font-color);">Right panel (place your widgets here)</p>
                </div>
        </aside>
</div>

<!-- iframe auto-resize script removed so iframe can show its own scrollbars -->


 <script>
     function toggleEdit() {
        const view = document.getElementById('profile-view');
        const edit = document.getElementById('profile-edit');
        if (view.style.display === "none") {
            view.style.display = "block";
            edit.style.display = "none";
        } else {
            view.style.display = "none";
            edit.style.display = "block";
        }
    }
    </script>
</body>
</html>
